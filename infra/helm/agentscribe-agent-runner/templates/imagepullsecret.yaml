{{- if .Values.ghcr.pat }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentscribe-agent-runner.fullname" . }}-ghcr
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentscribe-agent-runner.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{"ghcr.io":{"username":"%s","password":"%s","auth":"%s"}}}` .Values.ghcr.username .Values.ghcr.pat (printf "%s:%s" .Values.ghcr.username .Values.ghcr.pat | b64enc) | b64enc }}
{{- end }}
