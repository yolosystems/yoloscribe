{{- if and (not .Values.existingSecret) .Values.anthropicApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentscribe-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentscribe-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.existingSecretKey }}: {{ .Values.anthropicApiKey | quote }}
  {{- if .Values.supabaseServiceRoleKey }}
  supabase-service-role-key: {{ .Values.supabaseServiceRoleKey | quote }}
  {{- end }}
{{- end }}
