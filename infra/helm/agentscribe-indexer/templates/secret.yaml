{{- if .Values.supabaseServiceRoleKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentscribe-indexer.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentscribe-indexer.labels" . | nindent 4 }}
type: Opaque
stringData:
  supabase-service-role-key: {{ .Values.supabaseServiceRoleKey | quote }}
{{- end }}
