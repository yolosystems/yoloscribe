{{- if and (not .Values.existingSecret) .Values.anthropicApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "yoloscribe-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yoloscribe-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.existingSecretKey }}: {{ .Values.anthropicApiKey | quote }}
  {{- if .Values.supabaseServiceRoleKey }}
  supabase-service-role-key: {{ .Values.supabaseServiceRoleKey | quote }}
  {{- end }}
  {{- if .Values.cognitoClientSecret }}
  cognito-client-secret: {{ .Values.cognitoClientSecret | quote }}
  {{- end }}
{{- end }}
