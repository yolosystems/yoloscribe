{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "yoloscribe-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yoloscribe-backend.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["create", "delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "yoloscribe-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yoloscribe-backend.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "yoloscribe-backend.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "yoloscribe-backend.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
