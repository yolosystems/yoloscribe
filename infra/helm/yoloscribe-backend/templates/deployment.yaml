apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yoloscribe-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yoloscribe-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "yoloscribe-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "yoloscribe-backend.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "yoloscribe-backend.serviceAccountName" . }}
      {{- if .Values.ghcr.pat }}
      imagePullSecrets:
        - name: {{ include "yoloscribe-backend.fullname" . }}-ghcr
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "yoloscribe-backend.secretName" . }}
                  key: {{ .Values.existingSecretKey }}
            - name: S3_BUCKET
              value: {{ .Values.config.s3Bucket | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.config.allowedOrigins | quote }}
            - name: SQS_QUEUE_URL
              value: {{ .Values.config.sqsQueueUrl | quote }}
            - name: SQS_INDEXING_QUEUE_URL
              value: {{ .Values.config.sqsIndexingQueueUrl | quote }}
            - name: S3_VECTORS_BUCKET
              value: {{ .Values.config.s3VectorsBucket | quote }}
            - name: S3_VECTORS_INDEX_NAME
              value: {{ .Values.config.s3VectorsIndexName | quote }}
            - name: BEDROCK_EMBEDDING_MODEL
              value: {{ .Values.config.bedrockEmbeddingModel | quote }}
            - name: EKS_OIDC_PROVIDER
              value: {{ .Values.config.eksOidcProvider | quote }}
            - name: AWS_ACCOUNT_ID
              value: {{ .Values.config.awsAccountId | quote }}
            - name: AWS_REGION
              value: {{ .Values.config.awsRegion | quote }}
            - name: K8S_NAMESPACE
              value: {{ .Values.config.k8sNamespace | quote }}
            {{- if .Values.webhookSecret }}
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "yoloscribe-backend.fullname" . }}-webhook
                  key: webhook-secret
                  optional: true
            {{- end }}
            - name: AUTH_PROVIDER
              value: {{ .Values.config.authProvider | default "supabase" | quote }}
            {{- if eq (.Values.config.authProvider | default "supabase") "supabase" }}
            - name: SUPABASE_URL
              value: {{ .Values.config.supabaseUrl | quote }}
            {{- if .Values.supabaseServiceRoleKey }}
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "yoloscribe-backend.secretName" . }}
                  key: supabase-service-role-key
            {{- end }}
            {{- else if eq .Values.config.authProvider "cognito" }}
            - name: COGNITO_USER_POOL_ID
              value: {{ .Values.cognito.userPoolId | quote }}
            - name: COGNITO_CLIENT_ID
              value: {{ .Values.cognito.clientId | quote }}
            - name: COGNITO_DOMAIN
              value: {{ .Values.cognito.domain | quote }}
            {{- if .Values.cognitoClientSecret }}
            - name: COGNITO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "yoloscribe-backend.secretName" . }}
                  key: cognito-client-secret
            {{- end }}
            - name: DYNAMODB_USER_SITE_TABLE
              value: {{ .Values.cognito.dynamoDbUserSiteTable | quote }}
            - name: DYNAMODB_API_TOKENS_TABLE
              value: {{ .Values.cognito.dynamoDbApiTokensTable | quote }}
            {{- end }}
            {{- if .Values.config.cloudfrontDomain }}
            - name: CLOUDFRONT_DOMAIN
              value: {{ .Values.config.cloudfrontDomain | quote }}
            {{- end }}
            {{- if .Values.ingress.host }}
            - name: OAUTH_REDIRECT_URI
              value: {{ printf "https://%s/oauth/callback" .Values.ingress.host | quote }}
            {{- end }}
            {{- if .Values.config.mcpBaseUrl }}
            - name: MCP_BASE_URL
              value: {{ .Values.config.mcpBaseUrl | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
