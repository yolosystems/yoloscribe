# ── Image ────────────────────────────────────────────────────────────────────
image:
  repository: ""
  tag: latest
  pullPolicy: Always

# ── GitHub Container Registry credentials ────────────────────────────────────
# Never set ghcr.pat here — pass it via --set on the command line.
ghcr:
  username: ""          # set in environment-specific values file
  pat: ""               # pass via --set; never commit a real value

# ── Replicas & autoscaling ────────────────────────────────────────────────────
replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8000

# ── Ingress (AWS ALB via Load Balancer Controller) ────────────────────────────
ingress:
  enabled: true
  host: ""
  certificateArn: ""
  # ALB Ingress Group — set group.name to share an ALB with mcp-helm.
  # Both charts must use the same group.name. YoloScribe owns the catch-all
  # path (/) so it should have the highest group.order number (lowest priority).
  group:
    name: ""    # e.g. yolo-prod; leave empty for a dedicated ALB
    order: 20   # lowest priority — catch-all route
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"

# ── Service account (IRSA) ───────────────────────────────────────────────────
# The attached IAM role must have the policy defined in
# infra/iam/yoloscribe-backend-policy.json, which covers:
#   - s3:GetObject / PutObject / DeleteObject / ListBucket  on yoloscribe-* buckets
#   - secretsmanager:CreateSecret / PutSecretValue / GetSecretValue / DescribeSecret
#     on yoloscribe* secrets (per-user API keys + CloudFront signing key)
#   - iam:CreateRole / PutRolePolicy / GetRole on yoloscribe-user-* roles
#   - sqs:SendMessage on yoloscribe-* queues
serviceAccount:
  create: true
  iamRoleArn: ""

# ── Application config ────────────────────────────────────────────────────────
config:
  s3Bucket: ""
  allowedOrigins: ""
  sqsQueueUrl: ""
  sqsIndexingQueueUrl: ""
  eksOidcProvider: ""
  awsAccountId: ""
  awsRegion: ""
  k8sNamespace: ""
  cloudfrontDomain: ""
  # CloudFront signed-cookie media delivery (leave empty to disable).
  # cloudfrontSigningKeyId: the key pair ID returned by setup_cloudfront_media.sh
  # cloudfrontMediaDomain: CloudFront domain for /{site}/assets/* (may differ from cloudfrontDomain)
  cloudfrontSigningKeyId: ""
  cloudfrontMediaDomain: ""
  s3VectorsBucket: ""
  s3VectorsIndexName: "yoloscribe"
  bedrockEmbeddingModel: "amazon.titan-embed-text-v2:0"
  mcpBaseUrl: ""
  # Optional Anthropic API base URL override (leave empty to use the Anthropic default).
  # Set to a Bedrock Mantle endpoint to route all Anthropic model calls through it.
  modelBaseUrl: ""
  # Global model registry key fallback (haiku|sonnet|opus|glm|bedrock-haiku|bedrock-sonnet|bedrock-opus).
  # Overrides the strands-agents default (see YOLOSCRIBE_MODEL in CLAUDE.md). Leave empty to use "sonnet".
  model: ""
  # Auth provider — supabase (default) or cognito
  authProvider: "supabase"
  # Supabase (only used when authProvider=supabase)
  supabaseUrl: ""

# ── Webhook secret (for /webhooks/user-created) ───────────────────────────────
# Pass via --set on the command line; never commit a real value here.
webhookSecret: ""

# ── Supabase service role key (authProvider=supabase) ─────────────────────────
# Pass via --set on the command line; never commit a real value here.
supabaseServiceRoleKey: ""

# ── Cognito config (authProvider=cognito) ─────────────────────────────────────
cognito:
  userPoolId: ""
  clientId: ""
  domain: ""                                        # e.g. https://your-pool.auth.us-east-1.amazoncognito.com
  dynamoDbUserSiteTable: "yoloscribe-user-site"
  dynamoDbApiTokensTable: "yoloscribe-api-tokens"

# ── Cognito app client secret (authProvider=cognito) ──────────────────────────
# Pass via --set on the command line; never commit a real value here.
cognitoClientSecret: ""

# ── OTEL / Arize Phoenix tracing ─────────────────────────────────────────────
# Set endpoint to the internal Phoenix service DNS name to enable tracing.
# Pass headers via --set on the command line; never commit a real value here.
otel:
  endpoint: ""   # e.g. http://phoenix-svc.arize.svc.cluster.local:6006
  headers: ""    # e.g. "Authorization=Bearer <token>" — pass via --set

# ── Anthropic API key secret ──────────────────────────────────────────────────
# Option A: reference an existing Kubernetes secret (recommended for production)
#   existingSecret: yoloscribe-secrets
#   existingSecretKey: anthropic-api-key
#
# Option B: pass the key directly (for development only — do not commit)
#   anthropicApiKey: "sk-ant-..."
existingSecret: ""
existingSecretKey: anthropic-api-key
anthropicApiKey: ""

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# ── Probes ────────────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
