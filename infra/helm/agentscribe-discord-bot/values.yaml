# ── Image ────────────────────────────────────────────────────────────────────
image:
  repository: ""
  tag: latest
  pullPolicy: Always

# ── GitHub Container Registry credentials ────────────────────────────────────
# Never set ghcr.pat here — pass it via --set on the command line.
ghcr:
  username: ""          # set in environment-specific values file
  pat: ""               # pass via --set; never commit a real value

# ── Application config ────────────────────────────────────────────────────────
config:
  # Full URL of the AgentScribe backend API (e.g. https://api.runyolo.dev)
  agentscribeApiUrl: ""
  # Supabase project URL — used to look up api_tokens and upsert discord_configs
  supabaseUrl: ""

# ── Secrets ───────────────────────────────────────────────────────────────────
# Pass all secret values via --set on the command line; never commit real values here.
#
# discordBotToken          — the bot token from the Discord Developer Portal
# discordAesKey            — base64-encoded 32-byte key used to AES-256-GCM encrypt
#                            API tokens before storing them in discord_configs
# supabaseServiceRoleKey   — Supabase service role key (bypasses RLS for discord_configs)
discordBotToken: ""
discordAesKey: ""
supabaseServiceRoleKey: ""

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
