apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentscribe-discord-bot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentscribe-discord-bot.labels" . | nindent 4 }}
spec:
  # Discord bots are stateful (WebSocket connection) — run as a single replica.
  # Horizontal scaling requires Discord sharding, which is out of scope here.
  replicas: 1
  selector:
    matchLabels:
      {{- include "agentscribe-discord-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentscribe-discord-bot.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.ghcr.pat }}
      imagePullSecrets:
        - name: {{ include "agentscribe-discord-bot.fullname" . }}-ghcr
      {{- end }}
      containers:
        - name: discord-bot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentscribe-discord-bot.fullname" . }}
                  key: discord-bot-token
            - name: DISCORD_AES_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentscribe-discord-bot.fullname" . }}
                  key: discord-aes-key
            - name: AGENTSCRIBE_API_URL
              value: {{ .Values.config.agentscribeApiUrl | quote }}
            - name: SUPABASE_URL
              value: {{ .Values.config.supabaseUrl | quote }}
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentscribe-discord-bot.fullname" . }}
                  key: supabase-service-role-key
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
