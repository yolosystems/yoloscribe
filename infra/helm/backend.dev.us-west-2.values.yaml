image:
  repository: ghcr.io/nate-yolodev/yoloscribe-backend
  tag: latest
  pullPolicy: Always

ghcr:
  username: nate-yolodev

replicaCount: 1

ingress:
  enabled: true
  host: api-dev.yoloscribe.com
  certificateArn: "arn:aws:acm:us-west-2:295934381903:certificate/fa4c9a82-7f47-436e-9c20-945386ac7675"
  group:
    name: "yoloscribe-dev"    # e.g. yolo-prod; leave empty for a dedicated ALB
    order: 20
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"

serviceAccount:
  iamRoleArn: "arn:aws:iam::295934381903:role/yoloscribe-backend"

config:
  supabaseUrl: "https://logpcqkicxkeqoseajzd.supabase.co"
  mcpBaseUrl: "https://api-dev.yoloscribe.com"
  cloudfrontDomain: "app-dev.yoloscribe.com"
  s3Bucket: "yoloscribe-dev"
  s3VectorsBucket: "yoloscribe-dev-vectors"
  allowedOrigins: "https://app-dev.yoloscribe.com"
  sqsQueueUrl: "https://sqs.us-west-2.amazonaws.com/295934381903/yoloscribe-dev-jobs"
  sqsIndexingQueueUrl: "https://sqs.us-west-2.amazonaws.com/295934381903/yoloscribe-dev-indexing"
  eksOidcProvider: "oidc.eks.us-west-2.amazonaws.com/id/329F46753B3AC6C1484FA9A7D94216B0"
  awsAccountId: "295934381903"
  awsRegion: "us-west-2"
  k8sNamespace: "yolo"
