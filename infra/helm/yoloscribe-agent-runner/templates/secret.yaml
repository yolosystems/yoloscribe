{{- if and (not .Values.existingSecret) .Values.anthropicApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "yoloscribe-agent-runner.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yoloscribe-agent-runner.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.existingSecretKey }}: {{ .Values.anthropicApiKey | quote }}
{{- end }}
