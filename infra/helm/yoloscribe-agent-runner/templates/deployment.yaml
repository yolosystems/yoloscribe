apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yoloscribe-agent-runner.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yoloscribe-agent-runner.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "yoloscribe-agent-runner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "yoloscribe-agent-runner.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "yoloscribe-agent-runner.serviceAccountName" . }}
      {{- if .Values.ghcr.pat }}
      imagePullSecrets:
        - name: {{ include "yoloscribe-agent-runner.fullname" . }}-ghcr
      {{- end }}
      containers:
        - name: polling-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uv", "run", "polling-worker"]
          env:
            - name: SQS_QUEUE_URL
              value: {{ .Values.config.sqsQueueUrl | quote }}
            - name: SQS_INDEXING_QUEUE_URL
              value: {{ .Values.config.sqsIndexingQueueUrl | quote }}
            - name: AWS_REGION
              value: {{ .Values.config.awsRegion | quote }}
            - name: K8S_NAMESPACE
              value: {{ .Values.config.k8sNamespace | quote }}
            - name: AGENT_RUNNER_IMAGE
              value: {{ include "yoloscribe-agent-runner.runnerImage" . | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "yoloscribe-agent-runner.secretName" . }}
                  key: {{ .Values.existingSecretKey }}
                  optional: true
            {{- if .Values.config.modelBaseUrl }}
            - name: YOLOSCRIBE_MODEL_BASE_URL
              value: {{ .Values.config.modelBaseUrl | quote }}
            {{- end }}
            {{- if .Values.config.model }}
            - name: YOLOSCRIBE_MODEL
              value: {{ .Values.config.model | quote }}
            {{- end }}
            {{- if .Values.config.runnerModel }}
            - name: YOLOSCRIBE_RUNNER_MODEL
              value: {{ .Values.config.runnerModel | quote }}
            {{- end }}
            {{- if .Values.config.memoryReasonerModel }}
            - name: YOLOSCRIBE_MEMORY_REASONER_MODEL
              value: {{ .Values.config.memoryReasonerModel | quote }}
            {{- end }}
            {{- if .Values.config.consolidationReasonerModel }}
            - name: YOLOSCRIBE_CONSOLIDATION_REASONER_MODEL
              value: {{ .Values.config.consolidationReasonerModel | quote }}
            {{- end }}
            {{- if .Values.config.phoenixApiEndpoint }}
            - name: PHOENIX_API_ENDPOINT
              value: {{ .Values.config.phoenixApiEndpoint | quote }}
            {{- end }}
            {{- if .Values.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            {{- end }}
            {{- if .Values.otel.headers }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "yoloscribe-agent-runner.fullname" . }}-otel
                  key: otlp-headers
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
