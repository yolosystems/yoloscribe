apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "yoloscribe-agent-runner.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yoloscribe-agent-runner.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["create", "get", "update", "delete", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
