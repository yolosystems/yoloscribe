server {
    listen 80;
    root /usr/share/nginx/html;

    # Redirect bare root to /local/ so users can just open http://localhost:5173
    location = / {
        return 301 $scheme://$http_host/local/;
    }

    # Serve the built SPA from /local/.
    # Assets are relative to this prefix, matching how Vite builds with base: './'
    # Hash routing handles all page navigation client-side.
    location /local/ {
        try_files $uri $uri/ /local/index.html;
    }
}
